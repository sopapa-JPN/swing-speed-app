<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#071426">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>スイングスピード</title>
<style>
:root{--bg:#06101d;--card:#0e1d31;--line:#263b57;--text:#f8fafc;--muted:#a9b8cc;--blue:#2ea8ff;--green:#24c783;--yellow:#ffd166;--red:#ff6b7a}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#102747 0,#071426 42%,#050c15 100%);color:var(--text);font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic UI",sans-serif}main{max-width:880px;margin:auto;padding:16px 12px 54px}.hero{text-align:center;padding:16px 4px 8px}.hero h1{font-size:clamp(29px,7vw,48px);margin:0;font-weight:950}.hero p{margin:8px 0;color:var(--muted)}.card{background:rgba(14,29,49,.97);border:1px solid var(--line);border-radius:20px;padding:16px;margin:14px 0;box-shadow:0 18px 55px #0007}.card h2{margin:0 0 12px;font-size:19px}.stepbar{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.step{padding:9px 5px;text-align:center;border:1px solid var(--line);border-radius:12px;color:var(--muted);font-size:12px;font-weight:800}.step.active{border-color:var(--blue);background:#0b4269;color:#fff}.step.done{border-color:var(--green);background:#0b4938;color:#d7ffef}.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}@media(max-width:650px){.grid{grid-template-columns:1fr}}label{font-size:13px;color:var(--muted);display:block;margin:0 0 6px}input,select,button{width:100%;border-radius:13px;border:1px solid var(--line);padding:12px;font:inherit;color:#fff;background:#071426}button{border:none;background:linear-gradient(135deg,#0586d8,#2d68eb);font-weight:900;min-height:50px;cursor:pointer}button.secondary{background:#172b44;border:1px solid #355273}button.good{background:linear-gradient(135deg,#069b67,#20b75e)}button.warn{background:linear-gradient(135deg,#e58b00,#d45a00)}button:disabled{opacity:.38;cursor:not-allowed}.videoBox{position:relative;background:#000;border-radius:16px;overflow:hidden;min-height:235px;display:flex;align-items:center;justify-content:center}video{display:block;max-width:100%;max-height:68vh}canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.row{display:flex;gap:9px}.row>*{flex:1}.guide{font-size:14px;line-height:1.65;padding:12px;border-radius:12px;background:#10243b;border-left:5px solid var(--blue)}.guide.ok{border-left-color:var(--green);background:#0b2d25}.guide.warn{border-left-color:var(--yellow);background:#33280d;color:#ffefb0}.guide.bad{border-left-color:var(--red);background:#38141b;color:#ffd3d8}.tiny{font-size:12px;line-height:1.65;color:var(--muted)}.speedWrap{text-align:center;padding:18px 4px}.speed{font-size:clamp(64px,17vw,116px);font-weight:1000;line-height:.9;letter-spacing:-5px}.unit{font-size:23px;color:var(--muted);letter-spacing:0}.badge{display:inline-block;margin-top:16px;padding:8px 15px;border-radius:999px;background:#0b4938;color:#d9fff0;font-weight:900}.stats{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-top:18px;color:var(--muted)}.stats b{display:block;color:#fff;font-size:25px}.hidden{display:none!important}.historyItem{display:flex;justify-content:space-between;gap:8px;padding:11px 0;border-bottom:1px solid var(--line)}.progress{height:10px;background:#06101d;border-radius:999px;overflow:hidden;margin-top:10px}.progress>div{height:100%;width:0;background:linear-gradient(90deg,#2ea8ff,#24c783);transition:.2s}.markerNote{display:flex;gap:10px;align-items:center}.dot{width:17px;height:17px;border-radius:50%;background:#ff275d;border:3px solid #fff;flex:none}.footer{text-align:center;color:var(--muted);font-size:11px;margin-top:18px}
</style>
</head>
<body><main>
<section class="hero"><h1>⚾ スイングスピード</h1><p>動画を選んで、画面の順番どおりに進めます</p></section>
<section class="card"><div class="stepbar"><div id="s1" class="step active">1 動画</div><div id="s2" class="step">2 バット</div><div id="s3" class="step">3 先端</div><div id="s4" class="step">4 解析</div></div></section>
<section class="card">
<h2>1．動画と設定</h2>
<div class="grid">
<div><label>スイング動画</label><input id="file" type="file" accept="video/*"></div>
<div><label>バットの長さ</label><select id="bat"><option value="0.76">76 cm</option><option value="0.78" selected>78 cm</option><option value="0.80">80 cm</option><option value="0.81">81 cm</option><option value="0.82">82 cm</option><option value="0.83">83 cm</option><option value="0.84">84 cm</option><option value="0.85">85 cm</option></select></div>
<div><label>撮影モード</label><select id="fps"><option value="30">通常 30fps</option><option value="60">通常 60fps</option><option value="120">スロー 120fps</option><option value="240" selected>スロー 240fps</option></select></div>
<div><label>先端の目印</label><select id="marker"><option value="red" selected>赤・ピンク系</option><option value="yellow">黄色系</option><option value="blue">青系</option><option value="green">緑系</option><option value="custom">タップした色を使用</option></select></div>
</div>
<p class="tiny markerNote"><span class="dot"></span><span>先端に明るいテープを巻くと精度が上がります。真横から、カメラを固定し、バット全体が映るように撮影してください。</span></p>
</section>
<section class="card">
<h2>2．動画の画面で指定</h2>
<div class="videoBox" id="videoBox"><video id="video" playsinline controls></video><canvas id="overlay"></canvas></div>
<div class="row" style="margin-top:11px"><button id="prev" class="secondary" disabled>◀ 少し戻す</button><button id="next" class="secondary" disabled>少し進む ▶</button></div>
<div class="row" style="margin-top:9px"><button id="setBat" disabled>① バット両端</button><button id="setHead" disabled>② 先端の目印</button></div>
<div class="grid" style="margin-top:10px"><div><label>解析開始</label><input id="start" type="number" step="0.01" value="0"></div><div><label>解析終了</label><input id="end" type="number" step="0.01" value="1"></div></div>
<button id="analyze" class="good" disabled style="margin-top:11px">③ スイング速度を測る</button>
<div class="progress"><div id="bar"></div></div><div id="status" class="guide" style="margin-top:11px">まず動画を選んでください。</div>
</section>
<section id="result" class="card hidden"><h2>測定結果</h2><div class="speedWrap"><div class="speed"><span id="maxSpeed">--</span><span class="unit"> km/h</span></div><div id="rank" class="badge">測定待ち</div><div class="stats"><span>上位平均<b id="avgSpeed">--</b></span><span>追跡率<b id="quality">--%</b></span></div></div><div id="advice" class="guide"></div><button id="save" class="secondary" style="margin-top:11px">この記録を保存</button></section>
<section class="card"><h2>記録</h2><div id="history" class="tiny">まだありません。</div><button id="clear" class="secondary" style="margin-top:10px">記録をすべて消す</button></section>
<div class="footer">動画はアップロードされず、この端末内だけで解析されます。</div>
</main>
<script>
const $=id=>document.getElementById(id),video=$('video'),overlay=$('overlay'),ctx=overlay.getContext('2d',{willReadFrequently:true});
let url='',mode='',points=[],scale=0,head=null,color=null,lastResult=null;
function step(n,state){for(let i=1;i<=4;i++)$('s'+i).className='step'+(i<n?' done':i===n?' active':'')}
function msg(t,c=''){$('status').className='guide '+c;$('status').textContent=t}
function sync(){const r=video.getBoundingClientRect(),d=devicePixelRatio||1;overlay.width=Math.max(1,Math.round(r.width*d));overlay.height=Math.max(1,Math.round(r.height*d));ctx.setTransform(d,0,0,d,0,0);draw()}
function fit(){const r=video.getBoundingClientRect(),s=Math.min(r.width/video.videoWidth,r.height/video.videoHeight),w=video.videoWidth*s,h=video.videoHeight*s;return{s,ox:(r.width-w)/2,oy:(r.height-h)/2}}
function toV(x,y){const f=fit();return{x:(x-f.ox)/f.s,y:(y-f.oy)/f.s}}
function toC(p){const f=fit();return{x:f.ox+p.x*f.s,y:f.oy+p.y*f.s}}
function draw(track=[]){ctx.clearRect(0,0,overlay.width/(devicePixelRatio||1),overlay.height/(devicePixelRatio||1));const list=track.length?track:points;if(track.length>1){ctx.beginPath();track.forEach((p,i)=>{const q=toC(p);i?ctx.lineTo(q.x,q.y):ctx.moveTo(q.x,q.y)});ctx.strokeStyle='#ff275d';ctx.lineWidth=4;ctx.stroke()}list.forEach((p,i)=>{const q=toC(p);ctx.beginPath();ctx.arc(q.x,q.y,9,0,Math.PI*2);ctx.fillStyle=i===list.length-1?'#ff275d':'#2ea8ff';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.stroke()});if(points.length===2&&mode==='bat'){const a=toC(points[0]),b=toC(points[1]);ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle='#ffd166';ctx.lineWidth=4;ctx.stroke()}}
function frame(){const c=document.createElement('canvas');c.width=video.videoWidth;c.height=video.videoHeight;const x=c.getContext('2d',{willReadFrequently:true});x.drawImage(video,0,0);return x.getImageData(0,0,c.width,c.height)}
function pixel(p){const im=frame(),d=im.data,w=im.width;let r=0,g=0,b=0,n=0;for(let yy=-5;yy<=5;yy++)for(let xx=-5;xx<=5;xx++){const X=Math.round(p.x+xx),Y=Math.round(p.y+yy);if(X<0||Y<0||X>=w||Y>=im.height)continue;const i=(Y*w+X)*4;r+=d[i];g+=d[i+1];b+=d[i+2];n++}return[r/n,g/n,b/n]}
function preset(){const m=$('marker').value;return m==='red'?[235,45,85]:m==='yellow'?[235,205,35]:m==='blue'?[40,125,230]:m==='green'?[45,190,95]:null}
function cd(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1],a[2]-b[2])}
$('file').onchange=()=>{const f=$('file').files[0];if(!f)return;if(url)URL.revokeObjectURL(url);url=URL.createObjectURL(f);video.src=url;scale=0;head=color=null;points=[];$('result').classList.add('hidden');msg('動画を読み込んでいます。');step(1)};
video.onloadedmetadata=()=>{sync();['prev','next','setBat','setHead'].forEach(x=>$(x).disabled=false);const mid=Math.min(video.duration*.5,Math.max(.2,video.duration-.5));video.currentTime=mid;$('start').value=Math.max(0,mid-.45).toFixed(2);$('end').value=Math.min(video.duration,mid+.45).toFixed(2);msg('スイング直前で一時停止し、「① バット両端」を押してください。');step(2)};
window.addEventListener('resize',sync);video.addEventListener('seeked',()=>draw());
$('prev').onclick=()=>video.currentTime=Math.max(0,video.currentTime-.04);$('next').onclick=()=>video.currentTime=Math.min(video.duration,video.currentTime+.04);
$('setBat').onclick=()=>{video.pause();mode='bat';points=[];draw();msg('グリップ端 → バット先端の順で、2か所をタップしてください。')};
$('setHead').onclick=()=>{video.pause();mode='head';points=[];draw();msg('バット先端のテープ中央を1回タップしてください。')};
overlay.onpointerdown=e=>{if(!mode||!video.videoWidth)return;const r=overlay.getBoundingClientRect(),p=toV(e.clientX-r.left,e.clientY-r.top);if(p.x<0||p.y<0||p.x>video.videoWidth||p.y>video.videoHeight)return;if(mode==='bat'){points.push(p);if(points.length===2){const px=Math.hypot(points[1].x-points[0].x,points[1].y-points[0].y);scale=Number($('bat').value)/px;mode='';step(3);msg('バットの長さを設定しました。次に「② 先端の目印」を押してください。','ok')}}else{head=p;color=$('marker').value==='custom'?pixel(p):preset();points=[p];mode='';$('analyze').disabled=false;step(4);msg('準備完了です。開始・終了時刻を確認して「③ スイング速度を測る」を押してください。','ok')}draw()};
function seek(t){return new Promise(r=>{const f=()=>{video.removeEventListener('seeked',f);r()};video.addEventListener('seeked',f);video.currentTime=Math.max(0,Math.min(video.duration,t))})}
function target(im,last,rad){const d=im.data,w=im.width,h=im.height;let best=null,bs=1e9;for(let y=Math.max(1,Math.floor(last.y-rad));y<Math.min(h-1,Math.ceil(last.y+rad));y+=2)for(let x=Math.max(1,Math.floor(last.x-rad));x<Math.min(w-1,Math.ceil(last.x+rad));x+=2){const i=(y*w+x)*4,c=[d[i],d[i+1],d[i+2]],dist=cd(c,color),move=Math.hypot(x-last.x,y-last.y)*.16,score=dist+move;if(score<bs){bs=score;best={x,y,score}}}return bs<145?best:null}
$('analyze').onclick=async()=>{const st=Number($('start').value),et=Number($('end').value);if(!scale||!head||!(et>st)){msg('設定を確認してください。','bad');return}video.pause();$('analyze').disabled=true;const capture=Number($('fps').value),displayFps=30,timeFactor=capture>60?capture/displayFps:1;const samples=Math.min(150,Math.max(45,Math.round((et-st)*60))),dt=(et-st)/samples,track=[];let last={...head};for(let i=0;i<=samples;i++){await seek(st+i*dt);const found=target(frame(),last,Math.max(75,video.videoWidth*.105));if(found){last={x:found.x,y:found.y};track.push({t:(st+i*dt)/timeFactor,x:last.x,y:last.y})}$('bar').style.width=(i/samples*100).toFixed(0)+'%';await new Promise(r=>setTimeout(r,0))}
let sp=[];for(let i=1;i<track.length;i++){const sec=track[i].t-track[i-1].t,d=Math.hypot(track[i].x-track[i-1].x,track[i].y-track[i-1].y)*scale;if(sec>0)sp.push(d/sec*3.6)}sp=sp.filter(v=>v>5&&v<220).sort((a,b)=>a-b);const p90=sp.length?sp[Math.max(0,Math.floor(sp.length*.90)-1)]:0,top=sp.slice(Math.floor(sp.length*.70)),avg=top.length?top.reduce((a,b)=>a+b,0)/top.length:0,q=Math.round(track.length/(samples+1)*100);lastResult={date:new Date().toISOString(),max:p90,avg,q};$('maxSpeed').textContent=p90?p90.toFixed(1):'--';$('avgSpeed').textContent=avg?avg.toFixed(1):'--';$('quality').textContent=q+'%';$('rank').textContent=p90>=100?'🔥 100km/h突破':p90>=90?'🥇 とても速い':p90>=80?'🥈 良いスイング':p90?'🥉 記録更新を狙おう':'測定できません';$('advice').className='guide '+(q>=75?'ok':'warn');$('advice').textContent=q>=75?'追跡は良好です。同じ撮影条件で比べると成長が分かります。':'追跡が途切れています。先端テープを明るくし、背景と違う色にしてください。';$('result').classList.remove('hidden');$('result').scrollIntoView({behavior:'smooth'});draw(track.filter((_,i)=>i%Math.max(1,Math.floor(track.length/25))===0));$('analyze').disabled=false;$('bar').style.width='100%';msg('測定が終わりました。','ok')};
function hist(){const h=JSON.parse(localStorage.getItem('swingV1')||'[]');$('history').innerHTML=h.length?h.slice().reverse().slice(0,12).map((v,i)=>`<div class="historyItem"><span>${new Date(v.date).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span><b>${v.max.toFixed(1)} km/h</b></div>`).join(''):'まだありません。'}
$('save').onclick=()=>{if(!lastResult)return;const h=JSON.parse(localStorage.getItem('swingV1')||'[]');h.push(lastResult);localStorage.setItem('swingV1',JSON.stringify(h.slice(-100)));hist();$('save').textContent='保存しました ✓'};$('clear').onclick=()=>{if(confirm('記録をすべて消しますか？')){localStorage.removeItem('swingV1');hist()}};hist();
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script></body></html>
